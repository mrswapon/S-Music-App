name: s_music
description: "A Flutter music player app with Clean Architecture."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  flutter_bloc: ^9.1.0
  equatable: ^2.0.7

  # Audio & Video
  just_audio: ^0.9.43
  on_audio_query: ^2.9.0
  video_player: ^2.9.2

  # YouTube
  youtube_explode_dart: ">=2.3.5 <4.0.0"
  shimmer: ^3.0.0

  # Permissions
  permission_handler: ^11.3.1

  # Dependency Injection
  get_it: ^8.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  bloc_test: ^10.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
